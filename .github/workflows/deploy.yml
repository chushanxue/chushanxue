name: deployment

on:
	push:
		branches: ['main']
	schedule:
		- cron: '10 0 * * *'
	workflow_dispatch:

permissions:
	contents: write

jobs:
	deploy:
		runs-on: ubuntu-latest
		steps:
			- uses: actions/checkout@v4

			- uses: pnpm/action-setup@v4
				with:
					version: 9

			- uses: actions/setup-node@v4
				with:
					node-version: 20
					cache: pnpm

			- name: Install dependencies
				run: pnpm install --frozen-lockfile

			- name: Build site and refresh news digest
				run: pnpm build:pre

			- name: Deploy
				uses: peaceiris/actions-gh-pages@v3
				with:
					github_token: ${{ secrets.GITHUB_TOKEN }}
					publish_dir: ./docs
					force_orphan: true
